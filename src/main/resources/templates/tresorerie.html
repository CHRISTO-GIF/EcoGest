<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trésorerie – HolyFlame</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/bootstrap-icons.min.css">
  <style>body{background:#f0f4f8;margin:0}.page-wrap{display:flex;min-height:100vh}.main{flex:1;overflow-y:auto}</style>
</head>
<body>
<div class="page-wrap">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main p-4">

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb small">
        <li class="breadcrumb-item"><a th:href="@{/dashboard}">Tableau de bord</a></li>
        <li class="breadcrumb-item active">Trésorerie</li>
      </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="fw-bold mb-0"><i class="bi bi-cash-coin text-success me-2"></i>Trésorerie</h4>
      <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#modalPaiement">
        <i class="bi bi-plus-circle me-1"></i>Enregistrer un paiement
      </button>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
      <div class="col-sm-4">
        <div class="card border-0 shadow-sm text-center p-3">
          <i class="bi bi-receipt fs-2 text-success mb-1"></i>
          <div class="fw-bold fs-4" th:text="${#lists.size(paiements)}">0</div>
          <div class="text-muted small">Transactions</div>
        </div>
      </div>
      <div class="col-sm-4">
        <div class="card border-0 shadow-sm text-center p-3">
          <i class="bi bi-currency-dollar fs-2 text-primary mb-1"></i>
          <div class="fw-bold fs-4" th:text="${#numbers.formatDecimal(totalEncaisse, 0, 'COMMA', 0, 'POINT') + ' FCFA'}">0</div>
          <div class="text-muted small">Total encaissé</div>
        </div>
      </div>
      <div class="col-sm-4">
        <div class="card border-0 shadow-sm text-center p-3">
          <i class="bi bi-people-fill fs-2 text-info mb-1"></i>
          <div class="fw-bold fs-4" th:text="${#lists.size(eleves)}">0</div>
          <div class="text-muted small">Élèves suivis</div>
        </div>
      </div>
    </div>

    <!-- Tableau -->
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white py-3">
        <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between">
          <span class="fw-semibold"><i class="bi bi-table me-1 text-muted"></i>Historique des paiements</span>
          <div class="d-flex gap-2 align-items-center flex-wrap">
            <div class="input-group input-group-sm" style="width:220px">
              <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
              <input type="text" id="searchPaiements" class="form-control border-start-0 ps-0"
                     placeholder="Rechercher…" oninput="filterTable('searchPaiements','tablePaiements')">
            </div>
            <a th:href="@{/export/paiements/excel}" class="btn btn-sm btn-outline-success">
              <i class="bi bi-file-earmark-excel me-1"></i>Exporter Excel
            </a>
          </div>
        </div>
      </div>
      <div class="card-body p-0">
        <div th:if="${#lists.isEmpty(paiements)}" class="text-center text-muted py-5">
          <i class="bi bi-inbox fs-1 d-block mb-2"></i>Aucun paiement enregistré.
        </div>
        <div th:unless="${#lists.isEmpty(paiements)}" class="table-responsive">
          <table class="table table-hover align-middle mb-0" id="tablePaiements">
            <thead class="table-light">
              <tr><th>N° reçu</th><th>Élève</th><th>Classe</th><th>Montant</th><th>Type</th><th>Mode</th><th>Date</th><th class="text-end">Action</th></tr>
            </thead>
            <tbody>
              <tr th:each="p : ${paiements}">
                <td class="small text-muted fw-mono" th:text="${p.recuNumero}"></td>
                <td class="fw-semibold" th:text="${p.eleve?.nom + ' ' + p.eleve?.prenom}"></td>
                <td><span class="badge bg-primary-subtle text-primary" th:text="${p.eleve?.classe?.nom}"></span></td>
                <td class="fw-bold text-success" th:text="${#numbers.formatDecimal(p.montantVerse,0,'COMMA',0,'POINT') + ' FCFA'}"></td>
                <td><span class="badge bg-info-subtle text-info" th:text="${p.typePaiement}"></span></td>
                <td class="small" th:text="${p.modePaiement}"></td>
                <td class="small text-muted" th:text="${p.datePaiement != null ? #temporals.format(p.datePaiement,'dd/MM/yyyy HH:mm') : '–'}"></td>
                <td class="text-end">
                  <form th:action="@{/tresorerie/paiements/{id}/supprimer(id=${p.id})}" method="post" class="d-inline" onsubmit="return confirm('Supprimer ?')">
                    <button type="submit" class="btn btn-outline-danger btn-sm"><i class="bi bi-trash"></i></button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Paiement -->
<div class="modal fade" id="modalPaiement" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form th:action="@{/tresorerie/paiements}" method="post">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-cash-coin me-2 text-success"></i>Enregistrer un paiement</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label small fw-semibold">Élève *</label>
              <select name="eleveId" class="form-select" required>
                <option value="">— Choisir un élève —</option>
                <option th:each="e : ${eleves}" th:value="${e.id}" th:text="${e.nom + ' ' + e.prenom + ' (' + e.classe?.nom + ')'}"></option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-semibold">Montant (FCFA) *</label>
              <input type="number" name="montantVerse" class="form-control" step="0.01" min="0" required>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-semibold">N° reçu (optionnel)</label>
              <input type="text" name="recuNumero" class="form-control" placeholder="Auto-généré si vide">
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-semibold">Type de paiement *</label>
              <select name="typePaiement" class="form-select" required>
                <option value="">— Choisir —</option>
                <option>INSCRIPTION</option>
                <option>SCOLARITE</option>
                <option>CANTINE</option>
                <option>TRANSPORT</option>
                <option>AUTRE</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-semibold">Mode de paiement *</label>
              <select name="modePaiement" class="form-select" required>
                <option value="">— Choisir —</option>
                <option>ESPECES</option>
                <option>VIREMENT</option>
                <option>MOBILE_MONEY</option>
                <option>CHEQUE</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Annuler</button>
          <button type="submit" class="btn btn-success"><i class="bi bi-check-lg me-1"></i>Enregistrer</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="/js/bootstrap.bundle.min.js"></script>
<script>
function filterTable(inputId, tableId) {
  const q = document.getElementById(inputId).value.toLowerCase();
  document.querySelectorAll('#' + tableId + ' tbody tr').forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}
</script>
</body>
</html>
