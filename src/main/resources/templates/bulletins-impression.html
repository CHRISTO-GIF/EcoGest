<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="'Bulletins ' + ${classeNom} + ' – T' + ${trimestre}">Bulletins</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/bootstrap-icons.min.css">
  <style>
    body { background: #f0f4f8; margin: 0; }

    /* ── Barre de contrôle (masquée à l'impression) ── */
    .print-bar {
      position: sticky; top: 0; z-index: 100;
      background: #0b1f3a; color: #fff;
      padding: .75rem 1.5rem;
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .print-bar select, .print-bar .form-select { max-width: 180px; }

    /* ── Chaque bulletin occupe une page à l'impression ── */
    .bulletin-page {
      background: #fff;
      max-width: 800px;
      margin: 1.5rem auto;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,.1);
      overflow: hidden;
    }

    /* ── Impression ── */
    @media print {
      .print-bar { display: none !important; }
      body { background: #fff; }
      .bulletin-page {
        max-width: 100%;
        margin: 0;
        border-radius: 0;
        box-shadow: none;
        page-break-after: always;
        break-after: page;
      }
      .bulletin-page:last-child {
        page-break-after: avoid;
        break-after: avoid;
      }
    }
  </style>
</head>
<body>

  <!-- ── Barre de contrôle ── -->
  <div class="print-bar no-print">
    <a href="/bulletins" class="btn btn-sm btn-outline-light">
      <i class="bi bi-arrow-left me-1"></i>Retour
    </a>
    <span class="fw-semibold">
      <i class="bi bi-printer me-1"></i>
      <span th:text="${classeNom}"></span> —
      <span th:text="${trimestre == 1 ? '1er Trimestre' : (trimestre == 2 ? '2e Trimestre' : '3e Trimestre')}"></span>
      (<span th:text="${#lists.size(bulletins)}"></span> élève(s))
    </span>

    <!-- Changer classe -->
    <form method="get" action="/bulletins/impression" class="d-flex align-items-center gap-2 ms-auto">
      <input type="hidden" name="trimestre" th:value="${trimestre}">
      <select name="classeId" class="form-select form-select-sm"
              onchange="this.form.submit()" style="max-width:160px;background:#1e3a5f;color:#fff;border-color:#3a5f8a">
        <option value="" th:selected="${classeId == null}">Toutes les classes</option>
        <option th:each="c : ${classes}" th:value="${c.id}"
                th:text="${c.nom}"
                th:selected="${classeId != null and classeId == c.id}"></option>
      </select>

      <!-- Changer trimestre -->
      <select name="trimestre" class="form-select form-select-sm"
              onchange="this.form.submit()" style="max-width:130px;background:#1e3a5f;color:#fff;border-color:#3a5f8a">
        <option th:each="t : ${#numbers.sequence(1,3)}" th:value="${t}"
                th:text="${t == 1 ? '1er Trimestre' : (t == 2 ? '2e Trimestre' : '3e Trimestre')}"
                th:selected="${trimestre == t}"></option>
      </select>
    </form>

    <button onclick="window.print()" class="btn btn-success btn-sm">
      <i class="bi bi-printer-fill me-1"></i>Imprimer tout (<span th:text="${#lists.size(bulletins)}"></span>)
    </button>
  </div>

  <!-- ── Un bulletin par élève ── -->
  <div th:if="${#lists.isEmpty(bulletins)}" class="text-center text-muted py-5">
    <i class="bi bi-inbox fs-1 d-block mb-3 opacity-25"></i>
    <p>Aucun élève dans cette sélection.</p>
    <a href="/bulletins" class="btn btn-primary btn-sm">Retour aux bulletins</a>
  </div>

  <div th:each="b : ${bulletins}" class="bulletin-page">

    <!-- En-tête -->
    <div class="d-flex justify-content-between align-items-center p-3"
         style="background:#0b1f3a;color:#fff">
      <div>
        <div class="fw-bold fs-5">
          <i class="bi bi-fire text-warning me-1"></i>
          <span th:text="${nomEtab}"></span>
        </div>
        <div class="small opacity-75">Administration Scolaire</div>
      </div>
      <div class="text-end">
        <div class="fw-bold text-uppercase">Bulletin de Notes</div>
        <div class="small" th:text="${trimestre == 1 ? '1er Trimestre' : (trimestre == 2 ? '2e Trimestre' : '3e Trimestre')}"></div>
      </div>
    </div>

    <!-- Info élève -->
    <div class="d-flex gap-4 px-4 py-3 border-bottom flex-wrap">
      <div>
        <div class="text-muted small">Élève</div>
        <div class="fw-bold fs-5" th:text="${b['eleve'].nom + ' ' + b['eleve'].prenom}"></div>
      </div>
      <div>
        <div class="text-muted small">Classe</div>
        <div class="fw-bold" th:text="${b['eleve'].classe?.nom ?: '–'}"></div>
      </div>
      <div>
        <div class="text-muted small">Matricule</div>
        <div class="fw-semibold" th:text="${b['eleve'].matricule}"></div>
      </div>
      <div class="ms-auto text-end">
        <div class="text-muted small">Date</div>
        <div class="small" th:text="${#temporals.format(#temporals.createNow(),'dd/MM/yyyy')}"></div>
      </div>
    </div>

    <!-- Tableau des notes -->
    <div th:if="${#lists.isEmpty(b['notes'])}" class="text-center text-muted py-4 fst-italic small">
      Aucune note enregistrée pour ce trimestre.
    </div>

    <table th:unless="${#lists.isEmpty(b['notes'])}" class="table table-sm align-middle mb-0">
      <thead class="table-light">
        <tr>
          <th>Matière</th>
          <th class="text-center">Note /20</th>
          <th class="text-center">Coeff.</th>
          <th>Type</th>
          <th>Appréciation</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="n : ${b['notes']}">
          <td class="fw-semibold" th:text="${n.matiere?.nom}"></td>
          <td class="text-center">
            <span class="fw-bold"
                  th:classappend="${n.valeur != null and n.valeur >= 10} ? 'text-success' : 'text-danger'"
                  th:text="${n.valeur != null ? n.valeur + '/20' : '–'}"></span>
          </td>
          <td class="text-center text-muted small" th:text="${n.coefficient}"></td>
          <td><span class="badge bg-secondary-subtle text-secondary small" th:text="${n.type}"></span></td>
          <td class="small text-muted" th:text="${n.commentaire ?: '–'}"></td>
        </tr>
      </tbody>
      <tfoot style="background:#e8f0fe">
        <tr>
          <td colspan="4" class="fw-bold text-end pe-3">Moyenne générale :</td>
          <td class="fw-bold fs-5"
              th:classappend="${b['moyenne'] >= 10} ? 'text-success' : 'text-danger'"
              th:text="${b['moyenne'] + ' / 20'}"></td>
        </tr>
      </tfoot>
    </table>

    <!-- Mention + signature -->
    <div class="d-flex justify-content-between align-items-center px-4 py-3 border-top">
      <div>
        <span class="badge fs-6 px-3 py-2"
              th:classappend="${b['mentionCss']}"
              th:text="${b['mention']}"></span>
      </div>
      <div class="text-end text-muted small">
        <div class="mb-3">Signature du directeur</div>
        <div style="border-top:1px solid #999;padding-top:4px;min-width:120px">&nbsp;</div>
      </div>
    </div>

  </div><!-- /bulletin-page -->

  <script src="/js/bootstrap.bundle.min.js"></script>
</body>
</html>
