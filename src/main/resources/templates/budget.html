<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Budget – HolyFlame</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/bootstrap-icons.min.css">
  <style>
    body{background:#f0f4f8;margin:0}.page-wrap{display:flex;min-height:100vh}.main{flex:1;overflow-y:auto}
    .badge-revenu{background:#d1fae5;color:#065f46}.badge-depense{background:#fee2e2;color:#991b1b}
    .progress-bar-custom{height:8px;border-radius:4px}
  </style>
</head>
<body>
<div class="page-wrap">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main p-4">

    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
      <div>
        <h4 class="fw-bold mb-0"><i class="bi bi-bar-chart-fill text-primary me-2"></i>Budget Prévisionnel</h4>
        <p class="text-muted small mb-0">Planification et suivi budgétaire</p>
      </div>
      <div class="d-flex gap-2 align-items-center">
        <form th:action="@{/budget}" method="get" class="d-flex gap-2">
          <select name="annee" class="form-select form-select-sm" onchange="this.form.submit()">
            <option value="2024-2025" th:selected="${annee=='2024-2025'}">2024-2025</option>
            <option value="2025-2026" th:selected="${annee=='2025-2026'}">2025-2026</option>
            <option value="2026-2027" th:selected="${annee=='2026-2027'}">2026-2027</option>
          </select>
        </form>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalAjouter">
          <i class="bi bi-plus-lg me-1"></i>Ajouter
        </button>
      </div>
    </div>

    <!-- Résumé -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body p-3">
            <div class="small text-muted">Revenus prévus</div>
            <div class="fs-5 fw-bold text-success" th:text="${#numbers.formatDecimal(totalRevenuPrevu,1,'COMMA',0,'POINT')} + ' FCFA'">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body p-3">
            <div class="small text-muted">Dépenses prévues</div>
            <div class="fs-5 fw-bold text-danger" th:text="${#numbers.formatDecimal(totalDepensePrevu,1,'COMMA',0,'POINT')} + ' FCFA'">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body p-3">
            <div class="small text-muted">Revenus réels</div>
            <div class="fs-5 fw-bold text-primary" th:text="${#numbers.formatDecimal(totalRevenuReel,1,'COMMA',0,'POINT')} + ' FCFA'">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body p-3">
            <div class="small text-muted">Solde réel</div>
            <div class="fs-5 fw-bold" th:classappend="${soldeReel >= 0 ? 'text-success' : 'text-danger'}"
                 th:text="${#numbers.formatDecimal(soldeReel,1,'COMMA',0,'POINT')} + ' FCFA'">0</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tableau REVENUS -->
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-header bg-success bg-opacity-10 fw-semibold text-success border-0 py-2">
        <i class="bi bi-arrow-up-circle-fill me-2"></i>REVENUS
      </div>
      <div class="table-responsive">
        <table class="table table-sm table-hover mb-0">
          <thead class="table-light"><tr>
            <th>Désignation</th><th>Type</th><th>Mois</th>
            <th class="text-end">Prévu</th><th class="text-end">Réel</th><th class="text-end">Écart</th><th></th>
          </tr></thead>
          <tbody>
            <tr th:each="l : ${lignes}" th:if="${l.categorie == 'REVENU'}">
              <td th:text="${l.designation}"></td>
              <td><span class="badge text-bg-light" th:text="${l.typeLigne}"></span></td>
              <td th:text="${l.mois != null ? l.mois : 'Annuel'}"></td>
              <td class="text-end" th:text="${l.montantPrevu != null ? #numbers.formatDecimal(l.montantPrevu,1,'COMMA',0,'POINT') : '-'}"></td>
              <td class="text-end" th:text="${l.montantReel != null ? #numbers.formatDecimal(l.montantReel,1,'COMMA',0,'POINT') : '-'}"></td>
              <td class="text-end" th:with="ecart=${l.montantReel != null and l.montantPrevu != null ? l.montantReel - l.montantPrevu : null}">
                <span th:if="${ecart != null}" th:classappend="${ecart >= 0 ? 'text-success' : 'text-danger'}"
                      th:text="${(ecart >= 0 ? '+' : '') + #numbers.formatDecimal(ecart,1,'COMMA',0,'POINT')}"></span>
              </td>
              <td class="text-end">
                <button class="btn btn-link btn-sm p-0 text-danger"
                        th:onclick="|if(confirm('Supprimer ?')){document.getElementById('del-'+${l.id}).submit()}|">
                  <i class="bi bi-trash"></i>
                </button>
                <form th:id="|del-${l.id}|" th:action="@{'/budget/'+${l.id}+'/supprimer'}" method="post" class="d-none"></form>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(lignes.stream().filter(l -> l.categorie == 'REVENU').toList())}">
              <td colspan="7" class="text-center text-muted py-3 fst-italic">Aucune ligne de revenu</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Tableau DEPENSES -->
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-header bg-danger bg-opacity-10 fw-semibold text-danger border-0 py-2">
        <i class="bi bi-arrow-down-circle-fill me-2"></i>DÉPENSES
      </div>
      <div class="table-responsive">
        <table class="table table-sm table-hover mb-0">
          <thead class="table-light"><tr>
            <th>Désignation</th><th>Type</th><th>Mois</th>
            <th class="text-end">Prévu</th><th class="text-end">Réel</th><th class="text-end">Écart</th><th></th>
          </tr></thead>
          <tbody>
            <tr th:each="l : ${lignes}" th:if="${l.categorie == 'DEPENSE'}">
              <td th:text="${l.designation}"></td>
              <td><span class="badge text-bg-light" th:text="${l.typeLigne}"></span></td>
              <td th:text="${l.mois != null ? l.mois : 'Annuel'}"></td>
              <td class="text-end" th:text="${l.montantPrevu != null ? #numbers.formatDecimal(l.montantPrevu,1,'COMMA',0,'POINT') : '-'}"></td>
              <td class="text-end" th:text="${l.montantReel != null ? #numbers.formatDecimal(l.montantReel,1,'COMMA',0,'POINT') : '-'}"></td>
              <td class="text-end" th:with="ecart=${l.montantReel != null and l.montantPrevu != null ? l.montantPrevu - l.montantReel : null}">
                <span th:if="${ecart != null}" th:classappend="${ecart >= 0 ? 'text-success' : 'text-danger'}"
                      th:text="${(ecart >= 0 ? '+' : '') + #numbers.formatDecimal(ecart,1,'COMMA',0,'POINT')}"></span>
              </td>
              <td class="text-end">
                <button class="btn btn-link btn-sm p-0 text-danger"
                        th:onclick="|if(confirm('Supprimer ?')){document.getElementById('del-'+${l.id}).submit()}|">
                  <i class="bi bi-trash"></i>
                </button>
                <form th:id="|del-${l.id}|" th:action="@{'/budget/'+${l.id}+'/supprimer'}" method="post" class="d-none"></form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Modal Ajouter -->
<div class="modal fade" id="modalAjouter" tabindex="-1">
  <div class="modal-dialog">
    <form th:action="@{/budget}" method="post" class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Nouvelle ligne budgétaire</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" name="anneeScolaire" th:value="${annee}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Désignation *</label>
          <input type="text" name="designation" class="form-control" required>
        </div>
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label fw-semibold">Catégorie *</label>
            <select name="categorie" class="form-select" required>
              <option value="REVENU">Revenu</option>
              <option value="DEPENSE">Dépense</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold">Type</label>
            <select name="typeLigne" class="form-select">
              <option value="SCOLARITE">Scolarité</option>
              <option value="INSCRIPTION">Inscription</option>
              <option value="SUBVENTION">Subvention</option>
              <option value="SALAIRE">Salaire</option>
              <option value="CHARGES">Charges</option>
              <option value="MATERIEL">Matériel</option>
              <option value="AUTRE">Autre</option>
            </select>
          </div>
        </div>
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label fw-semibold">Montant prévu *</label>
            <input type="number" step="1" name="montantPrevu" class="form-control" required>
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold">Montant réel</label>
            <input type="number" step="1" name="montantReel" class="form-control">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Mois (laisser vide = annuel)</label>
          <select name="mois" class="form-select">
            <option value="">— Annuel —</option>
            <option th:each="m : ${#numbers.sequence(1,12)}" th:value="${m}"
                    th:text="${{'Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'}[m-1]}"></option>
          </select>
        </div>
        <div class="mb-2">
          <label class="form-label fw-semibold">Notes</label>
          <textarea name="notes" class="form-control" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/bootstrap.bundle.min.js"></script>
</body>
</html>
