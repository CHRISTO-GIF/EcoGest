<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tableau de bord Direction – HolyFlame</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/bootstrap-icons.min.css">
  <style>
    body{background:#f0f4f8;margin:0}.page-wrap{display:flex;min-height:100vh}.main{flex:1;overflow-y:auto}
    .kpi-card{border:0;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
    .kpi-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
  </style>
</head>
<body>
<div class="page-wrap">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main p-4">

    <div class="mb-4">
      <h4 class="fw-bold mb-0"><i class="bi bi-speedometer2 text-primary me-2"></i>Tableau de bord Direction</h4>
      <p class="text-muted small mb-0">Vue synthétique de l'établissement</p>
    </div>

    <!-- KPI Cards -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="card kpi-card p-3">
          <div class="d-flex align-items-center gap-3">
            <div class="kpi-icon bg-primary bg-opacity-10 text-primary"><i class="bi bi-people-fill"></i></div>
            <div>
              <div class="fs-3 fw-bold lh-1" th:text="${totalEleves}">0</div>
              <div class="small text-muted">Élèves</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card kpi-card p-3">
          <div class="d-flex align-items-center gap-3">
            <div class="kpi-icon bg-success bg-opacity-10 text-success"><i class="bi bi-cash-coin"></i></div>
            <div>
              <div class="fw-bold lh-1" th:text="${#numbers.formatDecimal(totalEncaisse,1,'COMMA',0,'POINT')+' F'}">0</div>
              <div class="small text-muted">Encaissé</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card kpi-card p-3">
          <div class="d-flex align-items-center gap-3">
            <div class="kpi-icon bg-warning bg-opacity-10 text-warning"><i class="bi bi-exclamation-triangle-fill"></i></div>
            <div>
              <div class="fs-3 fw-bold lh-1" th:text="${totalAbsences}">0</div>
              <div class="small text-muted">Absences</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card kpi-card p-3">
          <div class="d-flex align-items-center gap-3">
            <div class="kpi-icon bg-info bg-opacity-10 text-info"><i class="bi bi-person-badge-fill"></i></div>
            <div>
              <div class="fs-3 fw-bold lh-1" th:text="${totalPersonnels}">0</div>
              <div class="small text-muted">Personnel</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Budget synthèse -->
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <div class="card border-0 shadow-sm p-3 h-100">
          <h6 class="fw-semibold mb-3"><i class="bi bi-bar-chart-fill text-primary me-1"></i>Budget 2025-2026</h6>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted small">Revenus prévus</span>
            <span class="fw-bold text-success" th:text="${#numbers.formatDecimal(budgetRevenuPrevu,1,'COMMA',0,'POINT')+' FCFA'}"></span>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted small">Dépenses prévues</span>
            <span class="fw-bold text-danger" th:text="${#numbers.formatDecimal(budgetDepensePrevu,1,'COMMA',0,'POINT')+' FCFA'}"></span>
          </div>
          <div class="d-flex justify-content-between">
            <span class="text-muted small">Encaissé réel</span>
            <span class="fw-bold text-primary" th:text="${#numbers.formatDecimal(totalEncaisse,1,'COMMA',0,'POINT')+' FCFA'}"></span>
          </div>
          <div class="mt-3">
            <div class="progress" style="height:8px" title="Taux d'encaissement">
              <div class="progress-bar bg-success" th:style="${'width:'+(budgetRevenuPrevu > 0 ? (totalEncaisse/budgetRevenuPrevu*100 > 100 ? 100 : totalEncaisse/budgetRevenuPrevu*100) : 0)+'%'}"></div>
            </div>
            <small class="text-muted" th:text="${budgetRevenuPrevu > 0 ? #numbers.formatDecimal(totalEncaisse/budgetRevenuPrevu*100,1,'COMMA',1,'POINT')+'% encaissé' : '0%'}"></small>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card border-0 shadow-sm p-3 h-100">
          <h6 class="fw-semibold mb-3"><i class="bi bi-pie-chart-fill text-warning me-1"></i>Répartition des notes</h6>
          <canvas id="chartNotes" height="120"></canvas>
        </div>
      </div>
    </div>

    <!-- Graphiques -->
    <div class="row g-3">
      <div class="col-md-6">
        <div class="card border-0 shadow-sm p-3">
          <h6 class="fw-semibold mb-3"><i class="bi bi-graph-up text-success me-1"></i>Paiements par mois</h6>
          <canvas id="chartPaiements" height="160"></canvas>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card border-0 shadow-sm p-3">
          <h6 class="fw-semibold mb-3"><i class="bi bi-person-x-fill text-danger me-1"></i>Absences par mois</h6>
          <canvas id="chartAbsences" height="160"></canvas>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
  var paiementsLabels = /*[[${paiementsLabels}]]*/ [];
  var paiementsData   = /*[[${paiementsData}]]*/ [];
  var absencesData    = /*[[${absencesData}]]*/ [];
  var notesMentions   = /*[[${notesMentions}]]*/ [0,0,0,0,0];

  new Chart(document.getElementById('chartPaiements'), {
    type: 'bar',
    data: {
      labels: paiementsLabels,
      datasets:[{label:'Paiements (FCFA)',data:paiementsData,backgroundColor:'rgba(34,197,94,.7)',borderRadius:4}]
    },
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
  });

  new Chart(document.getElementById('chartAbsences'), {
    type: 'line',
    data: {
      labels: paiementsLabels,
      datasets:[{label:'Absences',data:absencesData,borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.1)',tension:.3,fill:true}]
    },
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
  });

  new Chart(document.getElementById('chartNotes'), {
    type: 'doughnut',
    data: {
      labels: ['Très bien (≥16)','Bien (14-15)','Assez bien (12-13)','Passable (10-11)','Insuffisant (<10)'],
      datasets:[{data:notesMentions,backgroundColor:['#22c55e','#3b82f6','#f59e0b','#6366f1','#ef4444']}]
    },
    options:{responsive:true,plugins:{legend:{position:'right',labels:{font:{size:10}}}}}
  });
</script>
</body>
</html>
