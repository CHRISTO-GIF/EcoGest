<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Matières – HolyFlame</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/bootstrap-icons.min.css">
  <style>body{background:#f0f4f8;margin:0}.page-wrap{display:flex;min-height:100vh}.main{flex:1;overflow-y:auto}</style>
</head>
<body>
<div class="page-wrap">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main p-4">

    <div th:if="${erreur}" class="alert alert-danger alert-dismissible fade show py-2 mb-3" role="alert">
      <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${erreur}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2 mb-3" role="alert">
      <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb small">
        <li class="breadcrumb-item"><a th:href="@{/dashboard}">Tableau de bord</a></li>
        <li class="breadcrumb-item active">Matières</li>
      </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-bold mb-0"><i class="bi bi-book-fill text-secondary me-2"></i>Matières enseignées</h4>
      <button class="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#modalMatiere">
        <i class="bi bi-plus-circle me-1"></i>Nouvelle matière
      </button>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-0">
        <div th:if="${#lists.isEmpty(matieres)}" class="text-center text-muted py-5">
          <i class="bi bi-inbox fs-1 d-block mb-2"></i>Aucune matière enregistrée.
        </div>
        <table th:unless="${#lists.isEmpty(matieres)}" class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr><th>#</th><th>Matière</th><th>Coefficient</th><th>Description</th><th class="text-end">Actions</th></tr>
          </thead>
          <tbody>
            <tr th:each="m, stat : ${matieres}">
              <td class="text-muted small" th:text="${stat.count}"></td>
              <td class="fw-bold" th:text="${m.nom}"></td>
              <td><span class="badge bg-primary-subtle text-primary" th:text="${m.coefficient + '×'}"></span></td>
              <td class="small text-muted" th:text="${m.description ?: '–'}"></td>
              <td class="text-end">
                <button class="btn btn-outline-secondary btn-sm me-1"
                        data-bs-toggle="modal"
                        th:attr="data-bs-target='#editMatiere' + ${m.id}">
                  <i class="bi bi-pencil"></i>
                </button>
                <form th:action="@{/matieres/{id}/supprimer(id=${m.id})}" method="post" class="d-inline" onsubmit="return confirm('Supprimer ?')">
                  <button type="submit" class="btn btn-outline-danger btn-sm"><i class="bi bi-trash"></i></button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal Nouvelle matière -->
<div class="modal fade" id="modalMatiere" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form th:action="@{/matieres}" method="post">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-book-fill me-2 text-secondary"></i>Nouvelle matière</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label small fw-semibold">Nom de la matière *</label>
              <input type="text" name="nom" class="form-control" placeholder="Mathématiques" required>
            </div>
            <div class="col-md-4">
              <label class="form-label small fw-semibold">Coefficient</label>
              <input type="number" name="coefficient" class="form-control" value="1" min="0.5" max="10" step="0.5">
            </div>
            <div class="col-12">
              <label class="form-label small fw-semibold">Description</label>
              <input type="text" name="description" class="form-control" placeholder="Description optionnelle">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Annuler</button>
          <button type="submit" class="btn btn-secondary"><i class="bi bi-check-lg me-1"></i>Ajouter</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Modals Edit par matière -->
<div th:each="m : ${matieres}">
  <div class="modal fade" th:id="'editMatiere' + ${m.id}" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form th:action="@{/matieres/{id}/modifier(id=${m.id})}" method="post">
          <div class="modal-header">
            <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>Modifier la matière</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-md-8">
                <label class="form-label small fw-semibold">Nom *</label>
                <input type="text" name="nom" class="form-control" th:value="${m.nom}" required>
              </div>
              <div class="col-md-4">
                <label class="form-label small fw-semibold">Coefficient</label>
                <input type="number" name="coefficient" class="form-control" th:value="${m.coefficient}" min="0.5" max="10" step="0.5">
              </div>
              <div class="col-12">
                <label class="form-label small fw-semibold">Description</label>
                <input type="text" name="description" class="form-control" th:value="${m.description}">
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Annuler</button>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Enregistrer</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="/js/bootstrap.bundle.min.js"></script>
</body>
</html>
